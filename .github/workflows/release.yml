name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend deps
        run: npm ci

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib

      - name: Build Tauri installer
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || format('v-{0}', github.sha) }}
          # Title = just the version tag (e.g. "v1.6.3"). The product name is
          # redundant on the repo's own releases page and, in the narrow release
          # sidebar, its prefix truncates off the version — the one distinguishing
          # part. GitHub defaults an unset name to the tag anyway.
          releaseName: ${{ github.ref_name }}
          releaseBody: |
            See the [installation guide](https://anothersava.github.io/claude-code-dashboard/pages/install) for downloads, system requirements, and the macOS first-launch workaround.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: false
